name: Update News
on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上 8 点
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Run update
        run: python update_news.py
      - name: Deploy
        run: |
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Update page" || exit 0
          git push
